
services:
  # MongoDB database
  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db  # Persists data even if container restarts

  # Flask API
  api:
    build: ./api
    container_name: flask-api
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/appdb
    depends_on:
      - mongo  # Ensures mongo starts before the API

  # Background worker
  worker:
    build: ./worker
    container_name: worker
    environment:
      - MONGO_URI=mongodb://mongo:27017/appdb
    depends_on:
      - mongo

volumes:
  mongo-data:
